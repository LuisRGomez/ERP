server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — fallback a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API al backend
    location /api/ {
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
